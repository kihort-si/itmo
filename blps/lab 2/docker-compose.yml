name: blps-lab

services:

  pg:
    image: postgres:17
    profiles: [infra]
    container_name: blps-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-s409091}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-0QdjvOPZ6gsasXOL}
      POSTGRES_DB:       ${POSTGRES_DB:-studs}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-s409091} -d ${POSTGRES_DB:-studs}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  pg_data:
    driver: local
  user_store:
    driver: local
