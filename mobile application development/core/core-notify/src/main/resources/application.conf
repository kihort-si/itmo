ktor {
    deployment {
        port = 8039
    }
    application {
        modules = [ com.vt.ApplicationKt.module ]
    }

    # SMTP delivery. Leave host empty to enable log-only mode (no real emails sent).
    smtp {
        host     = ""
        host     = ${?SMTP_HOST}
        port     = 587
        port     = ${?SMTP_PORT}
        user     = ""
        user     = ${?SMTP_USER}
        password = ""
        password = ${?SMTP_PASSWORD}
        from     = "noreply@mybroker.local"
        from     = ${?SMTP_FROM}
        tls      = true
        tls      = ${?SMTP_TLS_ENABLED}
    }

    # RabbitMQ consumer: reads from reports.in queue (vhost /reports).
    # Messages arrive there via shovel from worker.mails (registration)
    # and balm.reports (EOD reports).
    rabbitmq {
        host     = "rabbit"
        host     = ${?RABBITMQ_HOST}
        port     = 5672
        port     = ${?RABBITMQ_PORT}
        vhost    = "/reports"
        vhost    = ${?RABBITMQ_VHOST}
        user     = "admin"
        user     = ${?RABBITMQ_USER}
        password = "admin"
        password = ${?RABBITMQ_PASSWORD}
        queue    = "reports.in"
        queue    = ${?RABBITMQ_QUEUE}
    }

    # Reporting / template service URL
    rep {
        url = "http://core-rep:8038"
        url = ${?REP_SERVICE_URL}
    }
}
